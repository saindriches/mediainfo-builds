name: build

# Builds MediaInfo (the mediainfo CLI everywhere, plus a MediaInfo.app wxWidgets GUI on macOS) from
# ZenLib + MediaInfo (MediaArea) and MediaInfoLib checked out from the MMT/TLV PR branch
# (saindriches/MediaInfoLib @ mmt-tlv, PR #2647). That branch carries the File_MmtTlv MMT/TLV
# parser in-tree, so mediainfo reports assets, codecs, EIT, service, audio, and scramble state
# from ISDB-S3 4K/8K .mmts files. (No patch step: the branch is the source of truth.)
#
#   macOS   : one universal2 (arm64 + x86_64) build on Apple Silicon - CLI + MediaInfo.app (wx GUI),
#             both running on either architecture. No fragile Intel runner.
#   Linux   : native x86_64 CLI (autotools) + a portable GUI AppImage (wxGTK3, static wx).
#   Windows : x64 CLI via the official CMake path (MSVC); GUI via the MSVC solution (static wx).
#
# Caching, so iterating is cheap:
#   1. Built ZenLib + MediaInfoLib (in place), keyed on the pinned refs (incl. mmt-tlv commit) + archs.
#   2. Static wxWidgets prefix for the GUI (universal on macOS, GTK3 on Linux), keyed on wx version.
#   3. ccache for recompiles.
#
# On an all-build-jobs-success run the release job publishes the artifacts to a GitHub Release.

on:
  push:
    branches: [main]
    paths: ['scripts/**', '.github/workflows/build.yml', 'manifest.env']
  workflow_dispatch:
    inputs:
      force_rebuild_deps:
        description: "Ignore the deps prefix cache and rebuild ZenLib + MediaInfoLib"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  ZENLIB_REF: "v0.4.41"
  # Windows GUI (MSVC) needs a ZenLib whose .vcxproj sets ControlFlowGuard + GuardEHContMetadata to
  # match MediaInfo 26.05; the v0.4.41 tag predates that (LNK2047/LNK1386). master has it. autotools
  # (macOS/Linux) ignores this, so they stay on the v0.4.41 tag above.
  ZENLIB_WIN_REF: "2ddc277fe7ecfcbfe45616bb9cd9e23079113ecd"
  MEDIAINFOLIB_REPO: "saindriches/MediaInfoLib"
  MEDIAINFOLIB_REF: "e62f133dea1e01b5f9e0a09afafa6e684d2bcc77"
  MEDIAINFO_REF: "d327f8fe76208f0b70bc08e4b55dca508991500d"
  MEDIAINFO_VERSION: "26.05"
  WX_VERSION: "3.2.6"
  WX_WIN_VERSION: "3.1.7"
  MACOS_ARCHS: "arm64 x86_64"
  CACHE_EPOCH: "4"

jobs:
  # ---------------------------------------------------------------- macOS (universal2) -----------
  macos:
    runs-on: macos-14
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "1G"
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
    steps:
      - name: Set prefixes outside the workspace
        run: echo "WX_PREFIX=$RUNNER_TEMP/wxprefix" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
      - name: Checkout ZenLib
        uses: actions/checkout@v4
        with: { repository: MediaArea/ZenLib, ref: "${{ env.ZENLIB_REF }}", path: ZenLib }
      - name: Checkout MediaInfoLib
        uses: actions/checkout@v4
        with: { repository: "${{ env.MEDIAINFOLIB_REPO }}", ref: "${{ env.MEDIAINFOLIB_REF }}", path: MediaInfoLib }
      - name: Checkout MediaInfo
        uses: actions/checkout@v4
        with: { repository: MediaArea/MediaInfo, ref: "${{ env.MEDIAINFO_REF }}", path: MediaInfo }

      - name: Compute cache hashes
        id: keys
        run: |
          echo "wx_hash=$(shasum -a 256 scripts/build-wx-macos.sh | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Restore built deps (ZenLib + MediaInfoLib)
        id: depcache
        if: ${{ github.event.inputs.force_rebuild_deps != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ZenLib
            MediaInfoLib
          key: deps-macos-uni-zen${{ env.ZENLIB_REF }}-mil${{ env.MEDIAINFOLIB_REF }}-epoch${{ env.CACHE_EPOCH }}

      - name: Restore wxWidgets prefix
        id: wxcache
        uses: actions/cache@v4
        with:
          path: ${{ env.WX_PREFIX }}
          key: wx-macos-uni-${{ env.WX_VERSION }}-${{ steps.keys.outputs.wx_hash }}-epoch${{ env.CACHE_EPOCH }}

      - name: ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-${{ github.run_id }}
          restore-keys: ccache-macos-

      - name: Install toolchain
        run: brew install ccache libtool automake pkg-config dylibbundler

      - name: Build static universal wxWidgets
        if: ${{ steps.wxcache.outputs.cache-hit != 'true' }}
        run: ./scripts/build-wx-macos.sh

      - name: Build ZenLib + MediaInfoLib mmt-tlv (universal)
        if: ${{ steps.depcache.outputs.cache-hit != 'true' }}
        env: { CC: "ccache clang", CXX: "ccache clang++", ARCHS: "${{ env.MACOS_ARCHS }}" }
        run: ./scripts/build-deps.sh

      - name: Build CLI (universal)
        env: { CC: "ccache clang", CXX: "ccache clang++" }
        run: |
          set -euxo pipefail
          archflags=""; for a in $MACOS_ARCHS; do archflags="$archflags -arch $a"; done
          cd MediaInfo/Project/GNU/CLI
          autoreconf -if
          ./configure --enable-staticlibs CFLAGS="$archflags" CXXFLAGS="$archflags" LDFLAGS="$archflags"
          make -j"$(sysctl -n hw.ncpu)"
          test -x mediainfo || { echo "::error::mediainfo CLI not produced"; exit 1; }
          file mediainfo | grep -q 'Mach-O' || { echo "::error::CLI is a libtool wrapper, not a binary (stale shared deps cache?)"; exit 1; }
          lipo -info mediainfo
          # Only tab-indented path lines are real deps (a universal binary also prints per-arch
          # "(architecture ...)" headers). Fail on any non-system dylib.
          if otool -L mediainfo | grep $'^\t' | awk '{print $1}' | grep -qvE '^(/usr/lib|/System)/'; then
            echo "::error::CLI has a non-system dylib dep"; otool -L mediainfo; exit 1; fi
          ./mediainfo --version

      - name: Build GUI (static universal wxWidgets)
        env: { CC: "ccache clang", CXX: "ccache clang++" }
        run: |
          set -euxo pipefail
          archflags=""; for a in $MACOS_ARCHS; do archflags="$archflags -arch $a"; done
          export PATH="$WX_PREFIX/bin:$PATH"
          cd MediaInfo/Project/GNU/GUI
          autoreconf -if
          ./configure --enable-staticlibs --with-wx-static \
            --with-wx-config="$WX_PREFIX/bin/wx-config" \
            CFLAGS="$archflags" CXXFLAGS="$archflags" LDFLAGS="$archflags"
          make -j"$(sysctl -n hw.ncpu)"
          test -x mediainfo-gui || { echo "::error::mediainfo-gui not produced"; exit 1; }
          lipo -info mediainfo-gui

      - name: Package MediaInfo.app + CLI tarball
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/out"
          ./scripts/package-macos-app.sh \
            "MediaInfo/Project/GNU/GUI/mediainfo-gui" \
            "$GITHUB_WORKSPACE/MediaInfo" "$MEDIAINFO_VERSION" \
            "$GITHUB_WORKSPACE/out/MediaInfo.app"
          install -m755 "MediaInfo/Project/GNU/CLI/mediainfo" "$GITHUB_WORKSPACE/out/mediainfo"
          codesign -f -s - "$GITHUB_WORKSPACE/out/mediainfo"
          tar cJf "$GITHUB_WORKSPACE/out/mediainfo-cli-macos-universal.tar.xz" -C "$GITHUB_WORKSPACE/out" mediainfo
          tar cJf "$GITHUB_WORKSPACE/out/MediaInfo-gui-macos-universal.tar.xz" -C "$GITHUB_WORKSPACE/out" MediaInfo.app
          shasum -a 256 "$GITHUB_WORKSPACE"/out/*.tar.xz

      - uses: actions/upload-artifact@v4
        with:
          name: mediainfo-macos-universal
          path: |
            out/mediainfo-cli-macos-universal.tar.xz
            out/MediaInfo-gui-macos-universal.tar.xz
          if-no-files-found: error

  # ---------------------------------------------------------------- Linux (x86_64) ---------------
  linux:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      WX_PREFIX: ${{ github.workspace }}/wxprefix
    steps:
      - uses: actions/checkout@v4
      - name: Checkout ZenLib
        uses: actions/checkout@v4
        with: { repository: MediaArea/ZenLib, ref: "${{ env.ZENLIB_REF }}", path: ZenLib }
      - name: Checkout MediaInfoLib
        uses: actions/checkout@v4
        with: { repository: "${{ env.MEDIAINFOLIB_REPO }}", ref: "${{ env.MEDIAINFOLIB_REF }}", path: MediaInfoLib }
      - name: Checkout MediaInfo
        uses: actions/checkout@v4
        with: { repository: MediaArea/MediaInfo, ref: "${{ env.MEDIAINFO_REF }}", path: MediaInfo }

      - name: Compute wx hash
        id: keys
        run: echo "wx_hash=$(sha256sum scripts/build-wx-linux.sh | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Restore wxWidgets prefix (GTK3, static)
        id: wxcache
        uses: actions/cache@v4
        with:
          path: ${{ env.WX_PREFIX }}
          key: wx-linux-gtk3-${{ env.WX_VERSION }}-${{ steps.keys.outputs.wx_hash }}-epoch${{ env.CACHE_EPOCH }}

      - name: Restore built deps
        id: depcache
        if: ${{ github.event.inputs.force_rebuild_deps != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ZenLib
            MediaInfoLib
          key: deps-linux-x86_64-zen${{ env.ZENLIB_REF }}-mil${{ env.MEDIAINFOLIB_REF }}-epoch${{ env.CACHE_EPOCH }}

      - uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-linux-${{ github.run_id }}
          restore-keys: ccache-linux-

      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ccache autoconf automake libtool pkg-config build-essential git zlib1g-dev \
            libgtk-3-dev file patchelf desktop-file-utils librsvg2-bin imagemagick

      - name: Build static wxWidgets (GTK3)
        if: ${{ steps.wxcache.outputs.cache-hit != 'true' }}
        run: ./scripts/build-wx-linux.sh

      - name: Build ZenLib + MediaInfoLib mmt-tlv
        if: ${{ steps.depcache.outputs.cache-hit != 'true' }}
        env: { CC: "ccache gcc", CXX: "ccache g++" }
        run: ./scripts/build-deps.sh

      - name: Build CLI
        env: { CC: "ccache gcc", CXX: "ccache g++" }
        run: |
          set -euxo pipefail
          cd MediaInfo/Project/GNU/CLI
          autoreconf -if
          ./configure --enable-staticlibs
          make -j"$(nproc)"
          test -x mediainfo || { echo "::error::mediainfo CLI not produced"; exit 1; }
          ./mediainfo --version

      - name: Build GUI (static wxWidgets)
        env: { CC: "ccache gcc", CXX: "ccache g++" }
        run: |
          set -euxo pipefail
          export PATH="$WX_PREFIX/bin:$PATH"
          cd MediaInfo/Project/GNU/GUI
          autoreconf -if
          # --with-wx-static is required: our wx is static-only, so without it configure probes
          # `wx-config --static=no`, fails to find wx, and falls back to its builtin wx-compile path.
          ./configure --enable-staticlibs --with-wx-static --with-wx-config="$WX_PREFIX/bin/wx-config"
          make -j"$(nproc)"
          test -x mediainfo-gui || { echo "::error::mediainfo-gui not produced"; exit 1; }
          file mediainfo-gui | grep -q ELF || { echo "::error::mediainfo-gui is not an ELF binary (stale shared-deps cache?)"; exit 1; }
          ldd mediainfo-gui || true

      - name: Package CLI tarball + GUI AppImage
        run: |
          set -euxo pipefail
          mkdir -p "$GITHUB_WORKSPACE/out"
          tar cJf "$GITHUB_WORKSPACE/out/mediainfo-cli-linux-x86_64.tar.xz" -C "MediaInfo/Project/GNU/CLI" mediainfo
          ./scripts/package-appimage-linux.sh \
            "MediaInfo/Project/GNU/GUI/mediainfo-gui" \
            "$GITHUB_WORKSPACE/MediaInfo" "$MEDIAINFO_VERSION" \
            "$GITHUB_WORKSPACE/out/MediaInfo-gui-linux-x86_64.AppImage"
          sha256sum "$GITHUB_WORKSPACE"/out/mediainfo-cli-linux-x86_64.tar.xz "$GITHUB_WORKSPACE"/out/*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: mediainfo-linux-x86_64
          path: |
            out/mediainfo-cli-linux-x86_64.tar.xz
            out/MediaInfo-gui-linux-x86_64.AppImage
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows (x64 CLI + GUI) ------
  # CLI: official CMake path (Project/CMake/CLI) - FetchContent pulls MediaArea/ZenLib + zlib, the
  #      mmt-tlv MediaInfoLib compiles in from the sibling path -> static, self-contained mediainfo.exe.
  # GUI: the MSVC solution (Project/MSVC2022, there is no CMake GUI path). The GUI .vcxproj has
  #      ProjectReferences to wxWidgets' own wx_base/wx_core/wx_html/wx_wxpng .vcxproj plus
  #      ZenLib.vcxproj and MediaInfoLib.vcxproj, so a single msbuild of the MediaInfo-GUI target
  #      builds wxWidgets (from the sibling source) + both libs + the GUI. The .vcxproj hardcodes
  #      wx 3.1 lib names (wxbase31u.lib, ...), so we check out wxWidgets 3.1.x (WX_WIN_VERSION) as
  #      the sibling to match without editing upstream. Result: self-contained MediaInfo-GUI.exe.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: build-repo }
      - name: Checkout MediaInfo
        uses: actions/checkout@v4
        with: { repository: MediaArea/MediaInfo, ref: "${{ env.MEDIAINFO_REF }}", path: MediaInfo }
      - name: Checkout MediaInfoLib
        uses: actions/checkout@v4
        with: { repository: "${{ env.MEDIAINFOLIB_REPO }}", ref: "${{ env.MEDIAINFOLIB_REF }}", path: MediaInfoLib }

      - name: Setup MSVC environment
        uses: ./MediaInfo/.github/actions/setup-msvc
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure + build CLI (CMake, static)
        shell: bash
        run: |
          set -euxo pipefail
          cmake -G Ninja -D CMAKE_PREFIX_PATH=./cmake-prefix/ -D CMAKE_INSTALL_PREFIX=./cmake-prefix/ \
            -D CMAKE_BUILD_TYPE=Release -D BUILD_ZENLIB=ON -D BUILD_ZLIB=ON \
            -D ZLIB_BUILD_SHARED=OFF -D ZLIB_BUILD_TESTING=OFF \
            -B build ./MediaInfo/Project/CMake/CLI/
          cmake --build build
          cmake --install build
          test -f cmake-prefix/bin/mediainfo.exe || { echo "::error::mediainfo.exe not produced"; exit 1; }
          ./cmake-prefix/bin/mediainfo.exe --version

      # ZenLib + wxWidgets are checked out HERE (after the CLI build) on purpose: a sibling ZenLib/
      # present during the CLI CMake configure makes it use the v0.4.41 tree, whose ancient
      # cmake_minimum_required is rejected by the runner's CMake 4.x. The CLI uses FetchContent for
      # ZenLib instead; only the GUI msbuild needs these siblings.
      - name: Checkout ZenLib (sibling for the GUI msbuild)
        uses: actions/checkout@v4
        with: { repository: MediaArea/ZenLib, ref: "${{ env.ZENLIB_WIN_REF }}", path: ZenLib }
      - name: Checkout wxWidgets (sibling source for the GUI msbuild)
        uses: actions/checkout@v4
        with: { repository: wxWidgets/wxWidgets, ref: "v${{ env.WX_WIN_VERSION }}", path: wxWidgets, submodules: recursive }

      - name: Build GUI (MSVC solution, static wxWidgets)
        # pwsh, not bash: microsoft/setup-msbuild puts msbuild on the PATH for pwsh/cmd, but Git
        # Bash does not resolve it (the CLI step used cmake/ninja, which are on the default PATH).
        shell: pwsh
        run: |
          # Target only MediaInfo-GUI: msbuild pulls its ProjectReferences (wx_base/wx_core/wx_html/
          # wx_wxpng from the sibling wxWidgets source, plus ZenLib + the mmt-tlv MediaInfoLib) and
          # skips the unrelated solution projects (UWP, Qt, shell ext). -restore pulls MediaInfoLib's
          # zlib NuGet. Output lands in <SolutionDir>/x64/Release per the .vcxproj OutDir.
          # MediaInfo's GUI .vcxproj links wxpng.lib but omits wxzlib.lib, so wxpng's wx_zlib_*
          # symbols are unresolved (LNK2019/LNK1120). Add wxzlib.lib to the (Release) link inputs.
          $vcx = "MediaInfo/Project/MSVC2022/GUI/MediaInfo_GUI.vcxproj"
          (Get-Content $vcx -Raw) -replace 'wxpng\.lib;comctl32\.lib','wxpng.lib;wxzlib.lib;comctl32.lib' | Set-Content -NoNewline $vcx

          # wxpng depends on wx's bundled zlib, but the GUI's ProjectReferences don't pull it, so
          # wxzlib.lib is never built (LNK1181). Build it explicitly. wx names bundled libs wx_wx<lib>
          # (e.g. wx_wxpng.vcxproj), so glob rather than hardcode the exact filename.
          $zlibproj = Get-ChildItem "wxWidgets/build/msw" -Filter 'wx_*zlib*.vcxproj' | Select-Object -First 1
          if (-not $zlibproj) { Get-ChildItem "wxWidgets/build/msw" -Filter '*.vcxproj' | ForEach-Object { $_.Name }; throw "wx zlib vcxproj not found" }
          msbuild $zlibproj.FullName `
            -p:Configuration=Release -p:Platform=x64 -p:PlatformToolset=v143 -m -verbosity:minimal
          if ($LASTEXITCODE -ne 0) { throw "wx zlib build failed ($LASTEXITCODE)" }

          # ZENLIB_WIN_REF (ZenLib master) matches MediaInfo 26.05's ControlFlowGuard/ehcont settings,
          # so every module links with consistent guard metadata (no /guard:ehcont mismatch).
          # -p:PlatformToolset=v143: wxWidgets 3.1.7's bundled MSVC projects target the ancient v100
          # (VS2010) toolset, which the runner lacks (MSB8020); force the installed v143 for all.
          msbuild "MediaInfo/Project/MSVC2022/MediaInfo.sln" `
            -t:MediaInfo-GUI `
            -p:Configuration=Release -p:Platform=x64 `
            -p:PlatformToolset=v143 `
            -restore -p:RestorePackagesConfig=true `
            -m -verbosity:minimal
          if ($LASTEXITCODE -ne 0) { throw "msbuild MediaInfo-GUI failed ($LASTEXITCODE)" }
          $exe = Get-ChildItem "MediaInfo/Project/MSVC2022/x64/Release" -Filter *.exe -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Recurse "MediaInfo/Project/MSVC2022" -Filter *.exe -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "GUI exe not produced"
          }
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item $exe.FullName out/MediaInfo-GUI.exe
          Write-Host "built GUI: $($exe.Name)"

      - name: Package (CLI + GUI)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p out
          cp cmake-prefix/bin/mediainfo.exe out/
          7z a -tzip out/mediainfo-cli-windows-x64.zip ./out/mediainfo.exe >/dev/null
          # out/MediaInfo-GUI.exe was placed by the pwsh GUI step above.
          test -f out/MediaInfo-GUI.exe || { echo "::error::out/MediaInfo-GUI.exe missing"; exit 1; }
          7z a -tzip out/MediaInfo-gui-windows-x64.zip ./out/MediaInfo-GUI.exe >/dev/null
          ls -l out

      - uses: actions/upload-artifact@v4
        with:
          name: mediainfo-windows-x64
          path: |
            out/mediainfo-cli-windows-x64.zip
            out/MediaInfo-gui-windows-x64.zip
          if-no-files-found: error

  # ---------------------------------------------------------------- Release (gated) --------------
  # Runs only when every build job succeeded. Publishes the collected artifacts to a GitHub Release.
  release:
    needs: [macos, linux, windows]
    if: ${{ success() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          set -euxo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.zip' -o -name '*.AppImage' \) -exec cp {} release/ \;
          ls -l release
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MediaInfo (MMT/TLV) build ${{ github.run_number }}
          body: |
            MediaInfo ${{ env.MEDIAINFO_VERSION }} built from source with MediaInfoLib taken from the
            MMT/TLV PR branch (${{ env.MEDIAINFOLIB_REPO }} @ mmt-tlv, PR #2647), which provides the
            File_MmtTlv MMT/TLV parser.

            Artifacts (CLI + GUI on all three OS): universal2 macOS CLI + MediaInfo.app (arm64 +
            x86_64), Linux x86_64 CLI + GUI AppImage, Windows x64 CLI + GUI.

            Pinned: ZenLib ${{ env.ZENLIB_REF }}, MediaInfoLib ${{ env.MEDIAINFOLIB_REPO }}@${{ env.MEDIAINFOLIB_REF }},
            MediaInfo ${{ env.MEDIAINFO_REF }}.

            macOS binaries are ad-hoc signed (not notarized). Clear the quarantine xattr before use:
            xattr -dr com.apple.quarantine MediaInfo.app
          files: release/*
          fail_on_unmatched_files: true
